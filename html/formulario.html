<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../css/style.css">
    <title>Fale Conosco</title>
</head>
<body>
    <div class="container">
        <div class="form-image">
            <img src="../img/logo.jpeg">
        </div>
        <div class="form">
            <form action="#">
                <div class="form-header">
                    <div class="title">
                        <h1>Fale Conosco</h1>
                    </div>
                </div>
                <div class="input-group">
                    <div class="input-box">
                        <label for="firstname">Primeiro Nome:</label>
                        <input id="firstname" type="text" name="firstname" placeholder="Digite seu primeiro nome" required>
                    </div>
                    <div class="input-box">
                        <label for="lastname">Sobrenome:</label>
                        <input id="lastname" type="text" name="lastname" placeholder="Digite seu primeiro Sobrenome" required>
                    </div>
                    <div class="input-box">
                        <label for="email">Email:</label>
                        <input id="email" type="text" name="email" placeholder="Digite seu primeiro email" required>
                    </div>
                    <div class="input-box">
                        <label for="number">Telefone:</label>
                        <input id="number" type="tel" name="number" placeholder="(XX)XXXXX-XXXX" required>
                    </div>
                    <div class="input-box">
                        <label for="form">Digite sua mensagem:</label>
                        <textarea for="form" name="form" id="form" placeholder="Escreva sua mensagem"></textarea>
                    </div>
                    <!-- <div class="input-box">
                        <label for="password">Digite sua senha:</label>
                        <input id="password" type="password" name="password" placeholder="Digite sua senha" required>
                    </div>
                    <div class="input-box">
                        <label for="confirm-password">Confirme sua senha:</label>
                        <input id="confirm-password" type="password" name="confirm-password" placeholder="Confirme sua senha" required>
                    </div>
                </div> -->

                    <div class="gender-title">

                    </div>
                    <div class="gender-group">
                        <input type="radio" id="female" name="gender">
                        <label for="female">Feminino</label>
                    </div>
                    <div class="gender-group">
                        <input type="radio" id="male" name="gender">
                        <label for="male">Mascuino</label>
                    </div>
                    <div class="gender-group">
                        <input type="radio" id="others" name="gender">
                        <label for="others">Outros</label>
                    </div>
                    <div class="gender-group">
                        <input type="radio" id="none" name="gender">
                        <label for="none">Prefiro não dizer</label>
                    </div>
                </div> -->
                <div class="continue-button">
                    <button><a href="#">Continuar</a></button>
                </div>
            </form>
        </div>
        <a onclick="history.back()" class="whats">Voltar</a>
    </div>
    
</body>
</html>
